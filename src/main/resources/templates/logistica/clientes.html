<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{menu.html}">
      <head>
        <meta charset="utf-8">
        <title>Logistico</title>
        </head>
<body>
    <div layout:fragment="content">
        <div class="container mt-5">
            <h1>Listado de Clientes</h1>
        
            <!-- Formulario de búsqueda -->
            <form th:action="@{/logistica/clientes}" method="get" class="mb-3">
                <div class="input-group">
                    <input type="text" name="cedula" th:value="${cedula}" placeholder="Buscar por cédula" class="form-control">
                    <button type="submit" class="btn btn-primary">Buscar</button>
                </div>
            </form>
        
            <!-- Si se encuentra un cliente -->
            <div th:if="${cliente}">
                <h3>Resultado de la búsqueda</h3>
                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Cédula</th>
                        <th>Edad</th>
                        <th>Estatura</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                        
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${cliente.id}"></td>
                        <td th:text="${cliente.nombre}"></td>
                        <td th:text="${cliente.cedula}"></td>
                        <td th:text="${cliente.edad}"></td>
                        <td th:text="${cliente.estatura}"></td>
                        <td th:text="${cliente.correo}"></td>
                        <td th:text="${cliente.telefono}"></td>
                        <td>
                            <a th:href="@{'/logistica/tiquetes/registrar?clienteId=' + ${cliente.id}}" class="btn btn-success btn-sm">Registrar Tiquetes</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        
            <!-- Tabla de clientes paginados -->
            <div th:if="${clientes}">
                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Cédula</th>
                        <th>Contacto Familiar</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cliente : ${clientes.content}">
                        <td th:text="${cliente.id}"></td>
                        <td th:text="${cliente.nombre}"></td>
                        <td th:text="${cliente.cedula}"></td>
                        <td>
                            <a th:if="${cliente.edad < 18}" 
                               th:href="@{'/logistica/clientes/' + ${cliente.id} + '/contacto-familiar'}" 
                               class="btn btn-info btn-sm">
                                Ver Contacto
                            </a>
                            <span th:if="${cliente.edad >= 18}">No aplica</span>
                        </td>
                        <td>
                            <a th:href="@{'/logistica/tiquetes/registrar?clienteId=' + ${cliente.id}}" class="btn btn-success btn-sm">Registrar Tiquetes</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
        
                <!-- Paginación -->
                <nav>
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${clientes.hasPrevious()} ? '' : 'disabled'">
                            <a class="page-link" th:href="@{'/logistica/clientes?page=' + ${clientes.number - 1}}">Anterior</a>
                        </li>
                        <li class="page-item" th:classappend="${clientes.hasNext()} ? '' : 'disabled'">
                            <a class="page-link" th:href="@{'/logistica/clientes?page=' + ${clientes.number + 1}}">Siguiente</a>
                        </li>
                    </ul>
                </nav>
            </div>
        
            <!-- Botón agregar cliente -->
            <a href="/logistica/clientes/registrar" class="btn btn-primary">Agregar Cliente</a>
        </div>
      </div> 
</body>
</html>
