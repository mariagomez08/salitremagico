<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{menu.html}">
<head>
    <meta charset="utf-8">
    <title>Empleados</title>
</head>
<body>
    <div layout:fragment="content">
        <h2>Empleados</h2>
        <div class="text-end">
            <a href="/administrativo/empleados/nuevo" class="btn btn-primary mb-3">Agregar empleado</a>
        </div>
        <table class="table table-hover">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Cédula</th>
                <th>Rol</th>
                <th>Horario Laboral</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="empleado : ${empleados}">
                <td th:text="${empleado.nombre}"></td>
                <td th:text="${empleado.cedula}"></td>
                <td th:text="${empleado.rol}"></td>
                <td th:text="${empleado.horarioLaboral}"></td>
                <td class="text-end">
                    <a th:href="@{/administrativo/empleados/{id}/editar(id=${empleado.id})}">Editar</a>
                    <a href="javascript:void(0)" class="text-danger ms-3" th:onclick="'eliminarEmpleado(' + ${empleado.id} + ')'">Eliminar</a>
                    <form th:id="'eliminarEmpleadoForm' + ${empleado.id}" th:action="@{/administrativo/empleados/{id}/eliminar(id=${empleado.id})}" method="post" class="d-none"></form>
                </td>
            </tr>
            </tbody>
        </table>

        <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${empleados.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/administrativo/empleados(page=${empleados.number - 1})}">Anterior</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, empleados.totalPages)}"
                    th:classappend="${i == empleados.number + 1} ? 'active'">
                    <a class="page-link" th:href="@{/administrativo/empleados(page=${i - 1})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${empleados.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/administrativo/empleados(page=${empleados.number + 1})}">Siguiente</a>
                </li>
            </ul>
        </nav>
  
    <div layout:fragment="scripts">
        <script >
            function eliminarEmpleado(id) {
                if (!confirm('¿Estás seguro de eliminar este empleado?')) {
                    return;
                }
                document.getElementById('eliminarEmpleadoForm' + id).submit();
            }
        </script>
    </div>
    </body>
    </html>
