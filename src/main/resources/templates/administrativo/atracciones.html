<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{menu.html}">

<head>
    <meta charset="utf-8">
    <title>Atracciones</title>
</head>

<body>
    <div layout:fragment="content">
        <h2>Atracciones</h2>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Clasificación</th>
                    <th>Condiciones de uso</th>
                    <th>Estado</th>
                    <th>Estatura minima Metros</th>
                    <th>Frecuencia</th>
                    <th>Acciones</th>
                    
                </tr>
            </thead>
            <tbody>
                <tr th:each="atraccion : ${atracciones.content}">
                    <td th:text="${atraccion.nombre}"></td>
                    <td th:text="${atraccion.descripcion}"></td>
                    <td th:text="${atraccion.clasificacion}"></td>
                    <td th:text="${atraccion.condiciones}"></td>
                    <td th:text="${atraccion.estado}"></td>
                    <td th:text="${atraccion.estaturaMinima}"></td>
                    <td th:text="${atraccion.visitas}"></td>
                    <td class="text-end">
                        <a th:href="@{/administrativo/atracciones/{id}/editar(id=${atraccion.id})}"
                            class="btn btn-warning btn-sm">Editar Atraccion</a>
                    </td>
                </tr>
            </tbody>
        </table>
            
        <!-- Paginación -->
        <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${atracciones.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/administrativo/atracciones(page=${atracciones.number - 1})}">Anterior</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, atracciones.totalPages)}"
                    th:classappend="${i == atracciones.number + 1} ? 'active'">
                    <a class="page-link" th:href="@{/administrativo/atracciones(page=${i - 1})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${atracciones.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/administrativo/atracciones(page=${atracciones.number + 1})}">Siguiente</a>
                </li>
            </ul>
    </div>
</body>

</html>
