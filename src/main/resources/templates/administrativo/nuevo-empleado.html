<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{menu.html}">

<head>
    <meta charset="utf-8">
    <title>Registro de Empleado</title>
</head>

<body>
    <div layout:fragment="content" class="container my-5">
        <h2 th:text="${empleado.id != null} ? 'Editar Empleado' : 'Registrar Empleado'"></h2>
        <form th:object="${empleado}" 
        th:action="${empleado.id != null} ? @{/administrativo/empleados/{id}/editar(id=${empleado.id})} : @{/administrativo/empleados/nuevo}"
        method="post" class="needs-validation" novalidate>
            <div class="mb-3"> <label for="nombre" class="form-label">Nombre:</label> <input type="text" id="nombre"
                    th:field="*{nombre}" class="form-control" required>
                <div class="invalid-feedback">Por favor ingresa un nombre válido.</div>
            </div>
            <div class="mb-3"> <label for="cedula" class="form-label">Cédula:</label> <input type="number" id="cedula"
                    th:field="*{cedula}" class="form-control" required>
                <div class="invalid-feedback" 
                th:if="${#fields.hasErrors('cedula')}"
                th:errors="*{cedula}">Por favor ingresa una cédula válida.</div>
            </div>
            <div class="mb-3"> <label for="rol" class="form-label">Rol:</label> <select id="rol" th:field="*{rol}"
                    class="form-select" required>
                    <option th:each="rol : ${roles}" th:value="${rol}" th:text="${rol}"></option>
                </select>
                <div class="invalid-feedback" >Por favor selecciona un rol.</div>
            </div>
            
            <div class="mb-3"> <label for="horarioLaboral" class="form-label">Horario Laboral:</label> <input
                    type="text" id="horarioLaboral" th:field="*{horarioLaboral}" class="form-control" required>
                <div class="invalid-feedback">Por favor ingresa un horario laboral válido.</div>
            </div>
            <div> <button type="submit" class="btn btn-primary">Guardar</button> </div>
        </form>
    </div>
</body>

</html>
