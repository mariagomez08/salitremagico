<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{menu.html}">

<head>
    <meta charset="utf-8">
    <title>Atracciones Modulo mantenimiento</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="container mt-5">
            <h1>Listado de Atracciones</h1>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="atraccion : ${atracciones}">
                        <td th:text="${atraccion.id}"></td>
                        <td th:text="${atraccion.nombre}"></td>
                        <td th:text="${atraccion.estado}"></td>
                        <td>
                            <form th:action="@{/mantenimiento/atracciones/modificar}" method="post" class="d-inline">
                                <input type="hidden" name="id" th:value="${atraccion.id}">
                                <select name="estado" class="form-select form-select-sm d-inline w-auto">
                                    <option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}"
                                        th:selected="${atraccion.estado == estado}"></option>
                                </select>
                                <button type="submit" class="btn btn-primary btn-sm">Actualizar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
