<!DOCTYPE html>
<html lang="es"
   xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
   <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar With Bootstrap</title>
    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
	<link th:href="@{/css/menu.css}" rel="stylesheet" />
</head>

<body>
    <div class="wrapper">
        <aside id="sidebar">
            <div class="d-flex">
                <button class="toggle-btn" type="button">
                    <i class="lni lni-grid-alt"></i>
                </button>
                <div class="sidebar-logo">
                    <a href="#">Salitre parque</a>
                </div>
            </div>
            <ul class="sidebar-nav">
				<li class="sidebar-item">
                    <a href="#" class="sidebar-link collapsed has-dropdown" data-bs-toggle="collapse"
                        data-bs-target="#auth" aria-expanded="false" aria-controls="auth">
                        <i class="lni lni-protection"></i>
                        <span>Administrativo</span>
                    </a>
                    <ul id="auth" class="sidebar-dropdown list-unstyled collapse" data-bs-parent="#sidebar">
                        <li class="sidebar-item">
                            <a href="/administrativo/atracciones" class="sidebar-link">Atracciones</a>
                        </li>
						<li class="sidebar-item">
                            <a href="/administrativo/empleados" class="sidebar-link">Empleados</a>
                        </li>
						<li class="sidebar-item">
                            <a href="/administrativo/estaciones" class="sidebar-link">Estaciones</a>
                        </li>
                    </ul>
                </li>

				<li class="sidebar-item">
                    <a href="#" class="sidebar-link collapsed has-dropdown" data-bs-toggle="collapse"
                        data-bs-target="#multi" aria-expanded="false" aria-controls="multi">
                        <i class="lni lni-layout"></i>
                        <span>logistica</span>
                    </a>
                    <ul id="multi" class="sidebar-dropdown list-unstyled collapse" data-bs-parent="#sidebar">
                      
						<li class="sidebar-item">
                            <a href="/logistica/clientes" class="sidebar-link">Registrar cliente</a>
                        </li>
                    </ul>
                </li>

				<li class="sidebar-item">
                    <a href="/mantenimiento/atracciones" class="sidebar-link">
                        <i class="lni lni-cog"></i>
                        <span>Mantenimiento</span>
                    </a>
                </li>

                <li class="sidebar-item">
                    <a href="/operador/registrar-clientes" class="sidebar-link">
						<i class="lni lni-user"></i>
                        <span>Operador</span>
                    </a>
                </li>
             
               
                <li class="sidebar-item">
                    <a href="/publicidad/clientes" class="sidebar-link">
                        <i class="lni lni-popup"></i>
                        <span>Publicidad</span>
                    </a>
                </li>
       
            </ul>
   
        </aside>
        <div class="main p-3">
            <div class="text-center">
                <h1>
					<div layout:fragment="content" class="container my-5">
                </h1>
            </div>
        </div>
    </div>
    <div layout:fragment="scripts" th:remove="tag">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>
    <script >
		const hamBurger = document.querySelector(".toggle-btn");

		hamBurger.addEventListener("click", function () {
		document.querySelector("#sidebar").classList.toggle("expand");
		});
	</script>
</body>

</html>
